<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github issue tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="./styles/style.css">
</head>
<body class="bg-[#F8FAFC] min-h-screen py-10">
    <section class="min-h-screen max-w-[520px] bg-white shadow-xl mx-auto rounded-xl p-[32px]">
        <div class="image text-center">
            <img class="w-[100px] h-[100px] mb-[24px] mx-auto" src="./assets/github-logo.png" alt="" srcset="">
            <h2 class="font-semibold text-[24px]">GitHub Issues Tracker</h2>
            <p class="text-[16px] text-[#64748B] ">Sign in to manage your issues</p>
        </div>

        <div class="card  w-full max-w-sm mx-auto">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-[#1F2937] text-[16px]">Username</label>
          <input type="text" id="input-user" class="input text-[#64748B] border-[#E4E4E7]" placeholder="Enter Username" />
          <p class="text-[14px] text-[#4A00FF]">Default: admin</p>
          <label class="label text-[#1F2937] text-[16px]">Password</label>
          <input type="password" id="input-passward" class="input text-[#64748B] border-[#E4E4E7]" placeholder="Enter password" />
         <p class="text-[14px] text-[#4A00FF]">Default: admin123</p>
          <button id="input-btn" class="btn bg-[#4A00FF] mt-4 text-white font-semibold text-[16px]">Sign In</button>
        </fieldset>
        <div class="divider">OR</div>
         <p class="text-[14px] text-[#64748B] text-center">Demo Credentials</p>
            <div class="bg-[#F8FAFC] text-center p-[24px]">
                <p class="font-semibold">Username: <span class="text-[#1F2937]">admin</span></p>
                <p class="font-semibold">Password: <span class="text-[#1F2937]">admin123</span></p>

            </div>

        
           
        
      </div>
      
    </div>
    
  </div>
  

    </section>
    <script src="./scripts/script.js"></script>
</body>
</html>
