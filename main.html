<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue tracker page</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="./styles/style.css">
</head>
<body>

      <!-- header section -->
    <section class="header-section">
      <!-- container -->
      <div class="mx-auto p-3 shadow">
        <!-- header container -->
        <div class="header-container flex flex-col md:flex-row md:justify-between gap-3">
          <!-- img -->
          <div class="flex items-center gap-3">
            <img class="w-8 text-center" src="./assets/github-logo.png" alt="" />
            <h1 class="text-xl font-bold">GitHub Issues Tracker</h1>
          </div>

          <!-- search input -->
          <div class="join w-full max-w-md gap-5">
            <input
              type="search"
              placeholder="Search issues..."
              required
              class="input input-bordered join-item w-full py-3"
            />
            <button type="button" class="btn btn-primary join-item rounded-lg">
              <i class="fa-solid fa-plus"></i> New Issue
            </button>
          </div>
        </div>
      </div>
    </section>
    
</body>
</html>
