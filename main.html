<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Issue tracker page</title>

<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="./styles/style.css">
</head>

<body class="bg-[#F8FAFC] min-h-screen font-[Geist]">

<!-- HEADER -->
<nav class="bg-white shadow">
<div class="max-w-screen-xl mx-auto p-4">

<div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4">

<!-- logo -->
<div class="flex items-center gap-3">
<img class="w-8" src="./assets/github-logo.png" alt="">
<h1 class="text-lg md:text-xl font-bold">GitHub Issues Tracker</h1>
</div>

<!-- search -->
<div class="flex flex-col sm:flex-row w-full md:w-auto gap-3">

<input
type="search"
placeholder="Search issues..."
class="input input-bordered w-full sm:w-64"
/>

<button class="btn btn-primary w-full sm:w-auto">
<i class="fa-solid fa-plus"></i>
New Issue
</button>

</div>

</div>
</div>
</nav>


<!-- MAIN SECTION -->
<section class="w-full max-w-[1140px] mx-auto bg-white shadow p-4 md:p-6 mt-6 rounded-lg">

<!-- TABS -->
<div role="tablist" class="tabs flex flex-wrap gap-2 mb-6">

<button id="allTab"
class="tab tab-btn bg-[#4A00FF] text-white px-4 md:px-8 rounded">
All
</button>

<button id="openTab"
class="tab tab-btn border border-gray-300 px-4 md:px-8 rounded">
Opened
</button>

<button id="closedTab"
class="tab tab-btn border border-gray-300 px-4 md:px-8 rounded">
Closed
</button>

</div>


<!-- ISSUE INFO -->
<section class="py-4">

<div class="max-w-screen-xl mx-auto shadow p-4 rounded-lg">

<div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4">

<!-- issue text -->
<div class="flex gap-3 items-center">

<img class="w-8 h-8" src="assets/Aperture.png" alt="">

<div>
<h2 class="font-bold text-lg">
<span id="issue-count">0</span> Issues
</h2>

<p class="text-sm text-gray-500">
Track and manage your project issues
</p>
</div>

</div>

<div class="flex gap-4 text-sm">

<p class="flex items-center gap-1">
<i class="fa-solid fa-circle text-[#00A96E]"></i>
Open
</p>

<p class="flex items-center gap-1">
<i class="fa-solid fa-circle text-[#A855F7]"></i>
Closed
</p>

</div>

</div>
</div>

</section>


<!-- CARD SECTION -->
<section>


<div
id="all-card"
class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3"
>

<!-- Cards will be injected by JS -->

</div>

</div>

</section>

</section>


<script src="./scripts/main.js"></script>

</body>
</html>
